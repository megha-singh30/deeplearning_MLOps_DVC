# Here we will keep configuration related to diff stages of the project, 
#such as data ingestion, data transformation, model training, etc.
# we just need to modify the values of these keys in the config.yaml file, 
# and the code will read these values and use them accordingly.
# thus no need to hardcode any values in the code, making it more flexible and easier to maintain.

artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: https://github.com/entbappy/Branching-tutorial/raw/master/Chicken-fecal-images.zip
  local_data_file: artifacts/data_ingestion/chicken_fecal_images.zip
  unzip_dir: artifacts/data_ingestion

prepare_base_model:
  root_dir : artifacts/prepare_base_model
  base_model_path : artifacts/prepare_base_model/base_model.h5
  updated_base_model_path : artifacts/prepare_base_model/base_model_updated.h5
  
prepare_callbacks:
  root_dir: Path
  tensorboard_root_log_dir: Path
  checkpoint_model_filepath: Path
